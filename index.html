<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블러거비서 🤖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e3e;
    --gold: #f0a500;
    --gold2: #d4a017;
    --text: #e8e8f0;
    --text2: #9090a8;
    --green: #4ade80;
    --red: #f87171;
    --blue: #60a5fa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  .header {
    text-align: center;
    padding: 24px 0 20px;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: -0.5px;
  }

  .header p {
    color: var(--text2);
    font-size: 13px;
    margin-top: 6px;
  }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: var(--surface);
    padding: 6px;
    border-radius: 12px;
  }

  .tab {
    flex: 1;
    padding: 10px 8px;
    border: none;
    background: transparent;
    color: var(--text2);
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--gold);
    color: #000;
    font-weight: 700;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold2);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
    font-weight: 500;
  }

  input, textarea, select {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--gold);
  }

  input[type="password"] {
    letter-spacing: 2px;
  }

  textarea {
    resize: vertical;
    min-height: 100px;
    line-height: 1.6;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--gold);
    color: #000;
  }

  .btn-primary:hover { background: var(--gold2); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    margin-top: 8px;
  }

  .btn-danger {
    background: #3f1f1f;
    color: var(--red);
    border: 1px solid #5f2f2f;
    margin-top: 8px;
  }

  .status-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    line-height: 1.7;
    min-height: 80px;
    color: var(--text2);
    white-space: pre-wrap;
    word-break: break-all;
    margin-top: 12px;
  }

  .status-box.success { border-color: var(--green); color: var(--green); }
  .status-box.error { border-color: var(--red); color: var(--red); }
  .status-box.loading { border-color: var(--gold); color: var(--gold); }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
  }

  .badge-green { background: #1a3a2a; color: var(--green); }
  .badge-red { background: #3a1a1a; color: var(--red); }
  .badge-gold { background: #3a2a0a; color: var(--gold); }

  .row {
    display: flex;
    gap: 10px;
  }

  .row > * { flex: 1; }

  .keyword-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .keyword-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .keyword-tag:hover, .keyword-tag.selected {
    background: var(--gold);
    color: #000;
    border-color: var(--gold);
  }

  .preview-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    line-height: 1.8;
    margin-top: 12px;
    max-height: 300px;
    overflow-y: auto;
    color: var(--text);
  }

  .log-item {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text2);
  }

  .log-item:last-child { border-bottom: none; }
  .log-item .time { color: var(--gold2); font-size: 11px; }
  .log-item .title { color: var(--text); margin-top: 2px; }
  .log-item .result { color: var(--green); font-size: 11px; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    padding: 6px 0;
  }

  .info-row span:first-child { color: var(--text2); }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 10px;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 3px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .saved-indicator {
    font-size: 11px;
    color: var(--green);
    text-align: right;
    margin-top: -8px;
    margin-bottom: 8px;
  }

  .category-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid var(--border);
    cursor: pointer;
    background: var(--surface2);
    transition: all 0.2s;
  }

  .chip.active {
    background: var(--gold);
    color: #000;
    border-color: var(--gold);
    font-weight: 700;
  }

  .count-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
    flex: 1;
  }

  .count-badge .num {
    font-size: 24px;
    font-weight: 900;
    color: var(--gold);
  }

  .count-badge .label {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🤖 블러거비서</h1>
  <p>블로그스팟 자동 발행 도구 · upnote24</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('publish')">✍️ 발행</button>
  <button class="tab" onclick="switchTab('settings')">⚙️ 설정</button>
  <button class="tab" onclick="switchTab('log')">📋 로그</button>
</div>

<!-- 발행 탭 -->
<div id="tab-publish" class="panel active">

  <div class="card">
    <div class="card-title">🎯 카테고리</div>
    <div class="category-chips" id="categoryChips">
      <div class="chip active" onclick="selectCategory(this, '주차장')">🅿️ 주차장</div>
      <div class="chip" onclick="selectCategory(this, '캠핑')">⛺ 캠핑</div>
      <div class="chip" onclick="selectCategory(this, '맛집')">🍜 맛집</div>
      <div class="chip" onclick="selectCategory(this, '여행')">✈️ 여행</div>
      <div class="chip" onclick="selectCategory(this, '건강')">💊 건강</div>
      <div class="chip" onclick="selectCategory(this, '생활정보')">📌 생활정보</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🔑 키워드 입력</div>
    <input type="text" id="keyword" placeholder="예: 서울 무료 주차장 꿀팁" />
    <div class="card-title" style="margin-top:4px;">💡 추천 키워드</div>
    <div class="keyword-tags" id="suggestedKeywords">
      <span class="keyword-tag" onclick="useKeyword(this)">무료 주차장</span>
      <span class="keyword-tag" onclick="useKeyword(this)">캠핑 텐트 추천</span>
      <span class="keyword-tag" onclick="useKeyword(this)">실업급여 신청방법</span>
      <span class="keyword-tag" onclick="useKeyword(this)">건강보험 환급</span>
      <span class="keyword-tag" onclick="useKeyword(this)">어린이날 선물</span>
      <span class="keyword-tag" onclick="useKeyword(this)">KTX 할인</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📝 발행 옵션</div>
    <div class="row">
      <div>
        <label>발행 상태</label>
        <select id="publishStatus">
          <option value="LIVE">공개</option>
          <option value="DRAFT">임시저장</option>
        </select>
      </div>
      <div>
        <label>글 수</label>
        <select id="postCount">
          <option value="1">1개</option>
          <option value="3" selected>3개</option>
          <option value="5">5개</option>
          <option value="10">10개</option>
        </select>
      </div>
    </div>
    <label>이미지 출처</label>
    <select id="imageSource">
      <option value="pexels">Pexels (무료)</option>
      <option value="none">이미지 없음</option>
    </select>
  </div>

  <button class="btn btn-primary" id="publishBtn" onclick="startPublish()">
    🚀 자동 발행 시작
  </button>

  <div id="progressSection" style="display:none; margin-top:14px;">
    <div class="card">
      <div class="card-title"><span class="spinner"></span> 발행 중...</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="status-box loading" id="statusBox">준비 중...</div>
    </div>
  </div>

</div>

<!-- 설정 탭 -->
<div id="tab-settings" class="panel">

  <div class="card">
    <div class="card-title">🔐 API 키 설정</div>
    <div class="saved-indicator" id="saveIndicator" style="display:none;">✅ 저장됨</div>

    <label>Gemini API Key</label>
    <input type="password" id="geminiKey" placeholder="AIza..." />

    <label>Blogger Blog ID</label>
    <input type="text" id="blogId" placeholder="upnote24.blogspot.com의 블로그 ID" />

    <label>Blogger API Key</label>
    <input type="password" id="bloggerKey" placeholder="AIza..." />

    <label>Pexels API Key</label>
    <input type="password" id="pexelsKey" placeholder="Pexels API Key" />

    <label>Naver Client ID</label>
    <input type="text" id="naverClientId" placeholder="네이버 Client ID" />

    <label>Naver Client Secret</label>
    <input type="password" id="naverClientSecret" placeholder="네이버 Client Secret" />

    <button class="btn btn-primary" onclick="saveSettings()">💾 저장</button>
    <button class="btn btn-secondary" onclick="testApis()">🔍 API 연결 테스트</button>
    <div class="status-box" id="settingsStatus" style="display:none;"></div>
  </div>

  <div class="card">
    <div class="card-title">📊 블로그 정보</div>
    <div class="info-row">
      <span>블로그</span>
      <span>upnote24.blogspot.com</span>
    </div>
    <div class="divider"></div>
    <div class="info-row">
      <span>오늘 발행</span>
      <span id="todayCount"><span class="badge badge-gold">0개</span></span>
    </div>
    <div class="info-row">
      <span>총 발행</span>
      <span id="totalCount"><span class="badge badge-green">0개</span></span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🗑️ 데이터 관리</div>
    <button class="btn btn-danger" onclick="clearLogs()">로그 초기화</button>
    <button class="btn btn-danger" onclick="clearAll()">전체 초기화 (설정 포함)</button>
  </div>

</div>

<!-- 로그 탭 -->
<div id="tab-log" class="panel">

  <div class="card" style="padding:10px 14px; margin-bottom:14px;">
    <div style="display:flex; gap:10px;">
      <div class="count-badge">
        <div class="num" id="logTodayNum">0</div>
        <div class="label">오늘 발행</div>
      </div>
      <div class="count-badge">
        <div class="num" id="logTotalNum">0</div>
        <div class="label">총 발행</div>
      </div>
      <div class="count-badge">
        <div class="num" id="logFailNum">0</div>
        <div class="label">실패</div>
      </div>
    </div>
  </div>

  <div class="card" style="padding:0; overflow:hidden;">
    <div id="logList" style="max-height:400px; overflow-y:auto;">
      <div class="log-item" style="text-align:center; padding:30px; color:var(--text2);">
        아직 발행 기록이 없어요
      </div>
    </div>
  </div>

  <button class="btn btn-secondary" style="margin-top:14px;" onclick="refreshLog()">🔄 새로고침</button>

</div>

<script>
// ==================== 상태 관리 ====================
let currentCategory = '주차장';
let isPublishing = false;

// ==================== 초기화 ====================
window.onload = function() {
  loadSettings();
  updateStats();
  renderLog();
};

// ==================== 탭 전환 ====================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.remove('active');
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

  const tabs = ['publish', 'settings', 'log'];
  const idx = tabs.indexOf(tab);
  document.querySelectorAll('.tab')[idx].classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');

  if (tab === 'log') renderLog();
}

// ==================== 카테고리 선택 ====================
function selectCategory(el, cat) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentCategory = cat;
  updateSuggestedKeywords(cat);
}

function updateSuggestedKeywords(cat) {
  const keywords = {
    '주차장': ['무료 주차장', '서울 주차장', '공영주차장 할인', '주차요금 조회'],
    '캠핑': ['캠핑 텐트 추천', '봄 캠핑장', '오토캠핑 준비물', '글램핑 추천'],
    '맛집': ['서울 맛집 추천', '혼밥 맛집', '가성비 식당', '브런치 카페'],
    '여행': ['국내여행 추천', '당일치기 여행', '봄 여행지', '숨겨진 명소'],
    '건강': ['건강보험 환급', '실손보험 청구', '건강검진 예약', '영양제 추천'],
    '생활정보': ['실업급여 신청', '청년지원금', 'KTX 할인', '어린이날 선물'],
  };
  const kws = keywords[cat] || [];
  const container = document.getElementById('suggestedKeywords');
  container.innerHTML = kws.map(k =>
    `<span class="keyword-tag" onclick="useKeyword(this)">${k}</span>`
  ).join('');
}

function useKeyword(el) {
  document.getElementById('keyword').value = el.textContent;
}

// ==================== 설정 저장/불러오기 ====================
function saveSettings() {
  const settings = {
    geminiKey: document.getElementById('geminiKey').value,
    blogId: document.getElementById('blogId').value,
    bloggerKey: document.getElementById('bloggerKey').value,
    pexelsKey: document.getElementById('pexelsKey').value,
    naverClientId: document.getElementById('naverClientId').value,
    naverClientSecret: document.getElementById('naverClientSecret').value,
  };
  localStorage.setItem('bloggerSettings', JSON.stringify(settings));
  document.getElementById('saveIndicator').style.display = 'block';
  setTimeout(() => document.getElementById('saveIndicator').style.display = 'none', 2000);
  alert('✅ 설정이 저장되었어요!');
}

function loadSettings() {
  const saved = localStorage.getItem('bloggerSettings');
  if (!saved) return;
  const s = JSON.parse(saved);
  if (s.geminiKey) document.getElementById('geminiKey').value = s.geminiKey;
  if (s.blogId) document.getElementById('blogId').value = s.blogId;
  if (s.bloggerKey) document.getElementById('bloggerKey').value = s.bloggerKey;
  if (s.pexelsKey) document.getElementById('pexelsKey').value = s.pexelsKey;
  if (s.naverClientId) document.getElementById('naverClientId').value = s.naverClientId;
  if (s.naverClientSecret) document.getElementById('naverClientSecret').value = s.naverClientSecret;
}

function getSettings() {
  const saved = localStorage.getItem('bloggerSettings');
  return saved ? JSON.parse(saved) : {};
}

// ==================== API 테스트 ====================
async function testApis() {
  const s = getSettings();
  const statusEl = document.getElementById('settingsStatus');
  statusEl.style.display = 'block';
  statusEl.className = 'status-box loading';
  statusEl.textContent = '🔍 API 연결 테스트 중...';

  let results = [];

  // Gemini 테스트
  if (s.geminiKey) {
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${s.geminiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: '안녕' }] }] })
      });
      results.push(res.ok ? '✅ Gemini API: 정상' : '❌ Gemini API: 오류');
    } catch { results.push('❌ Gemini API: 연결 실패'); }
  } else { results.push('⚠️ Gemini API: 키 없음'); }

  // Pexels 테스트
  if (s.pexelsKey) {
    try {
      const res = await fetch('https://api.pexels.com/v1/search?query=nature&per_page=1', {
        headers: { Authorization: s.pexelsKey }
      });
      results.push(res.ok ? '✅ Pexels API: 정상' : '❌ Pexels API: 오류');
    } catch { results.push('❌ Pexels API: 연결 실패'); }
  } else { results.push('⚠️ Pexels API: 키 없음'); }

  statusEl.className = 'status-box';
  statusEl.textContent = results.join('\n');
}

// ==================== 자동 발행 ====================
async function startPublish() {
  if (isPublishing) return;

  const s = getSettings();
  if (!s.geminiKey) { alert('⚠️ 설정에서 Gemini API 키를 먼저 입력해주세요!'); return; }
  if (!s.blogId || !s.bloggerKey) { alert('⚠️ 설정에서 Blogger API 키와 블로그 ID를 입력해주세요!'); return; }

  const keyword = document.getElementById('keyword').value.trim();
  if (!keyword) { alert('⚠️ 키워드를 입력해주세요!'); return; }

  const count = parseInt(document.getElementById('postCount').value);
  const status = document.getElementById('publishStatus').value;

  isPublishing = true;
  document.getElementById('publishBtn').disabled = true;
  document.getElementById('progressSection').style.display = 'block';

  const statusBox = document.getElementById('statusBox');
  const progressFill = document.getElementById('progressFill');

  for (let i = 0; i < count; i++) {
    const progress = Math.round(((i) / count) * 100);
    progressFill.style.width = progress + '%';

    // 키워드 변형
    const variations = generateKeywordVariations(keyword, i);
    const currentKeyword = variations[i % variations.length];

    updateStatus(statusBox, `📝 [${i+1}/${count}] "${currentKeyword}" 글 생성 중...`);

    try {
      // 1. Gemini로 글 생성
      const content = await generateContent(s.geminiKey, currentKeyword, currentCategory);
      updateStatus(statusBox, `✅ 글 생성 완료 (${content.title})\n🖼️ 이미지 검색 중...`);

      // 2. Pexels 이미지
      let imageUrl = '';
      const imgSrc = document.getElementById('imageSource').value;
      if (imgSrc === 'pexels' && s.pexelsKey) {
        imageUrl = await getPexelsImage(s.pexelsKey, currentKeyword);
      }

      // 3. Blogger 발행
      updateStatus(statusBox, `✅ 글 생성 완료\n📤 블로그에 발행 중...`);
      const postUrl = await publishToBlogger(s.bloggerKey, s.blogId, content, imageUrl, status);

      updateStatus(statusBox, `🎉 [${i+1}/${count}] 발행 성공!\n📎 ${postUrl || '발행됨'}`);

      // 로그 저장
      saveLog({
        time: new Date().toLocaleString('ko-KR'),
        keyword: currentKeyword,
        title: content.title,
        url: postUrl,
        status: 'success'
      });

      updateStats();

      if (i < count - 1) {
        updateStatus(statusBox, `✅ ${i+1}개 완료! 다음 발행까지 잠시 대기...`);
        await sleep(3000);
      }

    } catch (err) {
      updateStatus(statusBox, `❌ [${i+1}/${count}] 오류: ${err.message}`, 'error');
      saveLog({
        time: new Date().toLocaleString('ko-KR'),
        keyword: currentKeyword,
        title: '발행 실패',
        url: '',
        status: 'fail'
      });
    }
  }

  progressFill.style.width = '100%';
  updateStatus(statusBox, `🎊 총 ${count}개 발행 완료!`, 'success');

  isPublishing = false;
  document.getElementById('publishBtn').disabled = false;
  updateStats();
}

function updateStatus(el, msg, type = 'loading') {
  el.className = `status-box ${type}`;
  el.textContent = msg;
}

// ==================== Gemini 글 생성 ====================
async function generateContent(apiKey, keyword, category) {
  const prompt = `반드시 아래 키워드에 대한 글만 작성하세요.

작성 키워드: "${keyword}"
카테고리: ${category}

위 키워드 "${keyword}"에 대한 블로그 글을 아래 JSON 형식으로만 응답하세요.
다른 주제로 쓰면 안됩니다. JSON 외 다른 말 하지 마세요.

{
  "title": "${keyword} 관련 제목",
  "content": "HTML 본문 (h2 3~4개, p태그 margin-bottom:20px, 2000자 이상)",
  "tags": "태그1,태그2,태그3,태그4,태그5"
}`;

  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 4096 }
    })
  });

  if (!res.ok) throw new Error(`Gemini API 오류: ${res.status}`);

  const data = await res.json();
  let text = data.candidates[0].content.parts[0].text;
  text = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();

  const parsed = JSON.parse(text);
  return parsed;
}

// ==================== Pexels 이미지 ====================
async function getPexelsImage(apiKey, keyword) {
  try {
    const query = encodeURIComponent(keyword.split(' ')[0]);
    const res = await fetch(`https://api.pexels.com/v1/search?query=${query}&per_page=5&orientation=landscape`, {
      headers: { Authorization: apiKey }
    });
    if (!res.ok) return '';
    const data = await res.json();
    if (data.photos && data.photos.length > 0) {
      const idx = Math.floor(Math.random() * Math.min(data.photos.length, 5));
      return data.photos[idx].src.large;
    }
  } catch { return ''; }
  return '';
}

// ==================== Blogger 발행 ====================
async function publishToBlogger(apiKey, blogId, content, imageUrl, status) {
  let body = content.content;
  if (imageUrl) {
    body = `<div style="text-align:center;margin-bottom:20px;"><img src="${imageUrl}" style="max-width:100%;border-radius:10px;" alt="${content.title}"/></div>\n` + body;
  }

  const labels = content.tags ? content.tags.split(',').map(t => t.trim()) : [];

  const postData = {
    kind: 'blogger#post',
    title: content.title,
    content: body,
    labels: labels,
  };

  const url = `https://www.googleapis.com/blogger/v3/blogs/${blogId}/posts/?key=${apiKey}&status=${status}&isDraft=${status === 'DRAFT'}`;

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(postData)
  });

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || `Blogger API 오류: ${res.status}`);
  }

  const data = await res.json();
  return data.url || '';
}

// ==================== 키워드 변형 ====================
function generateKeywordVariations(keyword, index) {
  const suffixes = ['방법', '꿀팁', '총정리', '완벽가이드', '추천', '비교', '후기'];
  const base = [keyword];
  suffixes.forEach(s => base.push(`${keyword} ${s}`));
  return base;
}

// ==================== 로그 관리 ====================
function saveLog(entry) {
  const logs = JSON.parse(localStorage.getItem('publishLogs') || '[]');
  logs.unshift(entry);
  if (logs.length > 100) logs.pop();
  localStorage.setItem('publishLogs', JSON.stringify(logs));
}

function getLogs() {
  return JSON.parse(localStorage.getItem('publishLogs') || '[]');
}

function renderLog() {
  const logs = getLogs();
  const container = document.getElementById('logList');

  if (logs.length === 0) {
    container.innerHTML = '<div class="log-item" style="text-align:center;padding:30px;color:var(--text2);">아직 발행 기록이 없어요</div>';
    return;
  }

  container.innerHTML = logs.map(log => `
    <div class="log-item">
      <div class="time">${log.time} · ${log.status === 'success' ? '<span style="color:var(--green)">✅ 성공</span>' : '<span style="color:var(--red)">❌ 실패</span>'}</div>
      <div class="title">${log.title || log.keyword}</div>
      ${log.url ? `<div class="result"><a href="${log.url}" target="_blank" style="color:var(--blue);font-size:11px;">🔗 글 보기</a></div>` : ''}
    </div>
  `).join('');

  updateStats();
}

function updateStats() {
  const logs = getLogs();
  const today = new Date().toLocaleDateString('ko-KR');
  const todayLogs = logs.filter(l => l.time.startsWith(today) && l.status === 'success');
  const total = logs.filter(l => l.status === 'success').length;
  const fails = logs.filter(l => l.status === 'fail').length;

  document.getElementById('todayCount').innerHTML = `<span class="badge badge-gold">${todayLogs.length}개</span>`;
  document.getElementById('totalCount').innerHTML = `<span class="badge badge-green">${total}개</span>`;
  document.getElementById('logTodayNum').textContent = todayLogs.length;
  document.getElementById('logTotalNum').textContent = total;
  document.getElementById('logFailNum').textContent = fails;
}

function refreshLog() { renderLog(); }

function clearLogs() {
  if (confirm('로그를 초기화할까요?')) {
    localStorage.removeItem('publishLogs');
    renderLog();
  }
}

function clearAll() {
  if (confirm('⚠️ 설정과 로그를 모두 초기화할까요?')) {
    localStorage.clear();
    location.reload();
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
